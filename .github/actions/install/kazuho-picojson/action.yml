name: Install PicoJSON
description: Install PicoJSON for building test application
inputs:
  version:
    description: The desired PicoJSON version to install
    required: false
    default: "v1.3.0"
runs:
  using: composite
  steps:
    - run: ${{ github.action_path }}/install-picojson.sh ${{ inputs.version }}
      shell: bash
